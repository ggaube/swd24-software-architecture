version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: demo-postgres
    environment:
      POSTGRES_DB: customers
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    container_name: demo-mongo
    ports:
      - "27017:27017"